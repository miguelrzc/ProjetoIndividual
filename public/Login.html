     <header class="background-cinza">

     <span style="color: #4A5568; font-weight: bold; font-size: 24px;">Peniel<span style="color: #2eb29b;">.</span></span>
                    <img src="img/book.png" alt="Logo" style="width: 25px; margin-right: 10px;">

            </div>

                      <div class="voltar">
        <a href="index.html" style="text-decoration: none; color: #718096; font-weight: 500; display: flex; align-items: center; gap: 8px;">
          <i class="fa-solid fa-arrow-left"></i> Voltar ao início
        </a>
      </div>

            </nav>

    <main>

        <div class="containerLogin">
        <div class="card-login">
    
        <span class="card-logo"> Peniel<span>.</span></span>
        <h1 class="card-titulo"> Faça Login </h1>
        <p class="card-subTitulo">Bem-vindo de volta. Continue sua Jornada.</p>

        <div class="card-line"></div> <!-- Linha de divisão -->

        <div class="input-box"> 
        <input id="input_email" type="email" placeholder="Peniel@email.com">
        <i class="fa-solid fa-envelope"></i>

        </div>
        <div class="input-box">
        <input id="input_senha" type="password" placeholder="Senha">
        <i class="fa-solid fa-lock"></i>

        </div>
        <div>
            <button onclick="entrar()" type="button" class="login">Login</button>
        </div>
        <div class="link-cadastro">
           <p> Não tem uma conta? <a href="cadastro.html">Cadastre-se</a> </p> 
        </div>

        <div class="card-line"></div> <!-- Linha antes do verisiculo -->

        <div class="versotxt">
            "Porque me viu a face de Deus e a minha vida foi preservada."
        </div>
        <div class="versoNum">
            Gênesis 32:30
        </div>

</div> </div>

    </main>


</body>
</html>
<script>
function entrar() {
    var emailVar = input_email.value;
    var senhaVar = input_senha.value;

    if (emailVar == "" || senhaVar == "") {
        alert("Preencha todos os campos!");
        return;
    }

    fetch("/usuarios/autenticar", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            emailServer: emailVar,
            senhaServer: senhaVar
        })
    }).then(function (resposta) {
        if (resposta.ok) {
            resposta.json().then(json => {
                console.log("Dados recebidos:", json);

  
                sessionStorage.EMAIL_USUARIO = json.email;
                sessionStorage.NOME_USUARIO = json.nome;
                sessionStorage.ID_USUARIO = json.id;

                alert("Login realizado com sucesso! Bem-vindo.");
                
                setTimeout(function () {
                    window.location.href = "devocional.html";
                }, 1000);
            });
        } else {
            alert("Email ou senha inválidos!");
            resposta.text().then(texto => { console.error(texto) });
        }
    }).catch(function (erro) {
        console.log(erro);
    });
}

</script>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="css/Login.css" />
    <title>Document</title>
  </head>
  <link rel="stylesheet" href="./css/cadastro.css" />
  <body>
    <header class="background-cinza">
      <div class="container">
        <nav>
          <div class="logo">
            <a
              href="index.html"
              style="display: flex; align-items: center; text-decoration: none"
            >
              <span style="color: #4a5568; font-weight: bold; font-size: 24px"
                >Peniel<span style="color: #2eb29b">.</span></span
              >
              <img
                src="img/book.png"
                alt="Logo"
                style="width: 25px; margin-right: 10px"
              />
            </a>
          </div>

          <div class="voltar">
        <a href="index.html" style="text-decoration: none; color: #718096; font-weight: 500; display: flex; align-items: center; gap: 8px;">
          <i class="fa-solid fa-arrow-left"></i> Voltar ao início
        </a>
      </div>


        </nav>
      </div>
    </header>

    <main>
      <div class="containerLogin">
        <div class="card-login">
          <form onsubmit="return false;">
            <span class="card-logo"> Peniel<span>.</span></span>
            <h1 class="card-titulo">Criar Conta</h1>
            <p class="card-subTitulo">Comece sua jornada gratuitamente.</p>

            <div class="card-line"></div>
            <!-- Linha de divisão -->

            <div class="input-box">
              <input id="idNome" type="text" placeholder="Seu nome" />
             <i class="fa-solid fa-user"></i>
            </div>

            <div class="input-box">
              <input id="idEmail" type="email" placeholder="Peniel@email.com" />
            <i class="fa-solid fa-envelope"></i>
            </div>
            <div class="input-box">
              <input id="idSenha" type="password" placeholder="Senha" />
              <i class="fa-solid fa-lock"></i>
            </div>
            <div class="input-box">
              <input
                id="idConfirmarSenha"
                type="password"
                placeholder="Confirme sua Senha"
              />
              <i class="fa-solid fa-lock"></i>
            </div>
            <div>
              <button type="button" onclick="cadastrar()" class="login">Criar Conta</button>
            </div>
            <div class="link-cadastro">
              <p>Já tem uma conta? <a href="Login.html">Fazer Login</a></p>
            </div>

            <div class="card-line"></div>
            <!-- Linha antes do verisiculo -->

            <div class="versotxt">
              "Porque me viu a face de Deus e a minha vida foi preservada."
            </div>
            <div class="versoNum">Gênesis 32:30</div>
          </form>
        </div>
      </div>
    </main>
  </body>
</html>

<script>
  function cadastrar() {
    var nomeVar = idNome.value;
    var emailVar = idEmail.value;
    var senhaVar = idSenha.value;
    var confirmacaoSenhaVar = idConfirmarSenha.value;

    if (
      nomeVar == "" ||
      emailVar == "" ||
      senhaVar == "" ||
      confirmacaoSenhaVar == ""
    ) {
      alert("Preencha todos os campos para prosseguir!");
      return false;
    }

    if (senhaVar != confirmacaoSenhaVar) {
        alert("As senhas não coincidem!");
        return false;
    }

  
    var vetorSenha = [senhaVar]; 
    var tamanhoSenha = 0;

    for (var i = 0; i < vetorSenha[0].length; i++) {
        tamanhoSenha++;
    }

    if (tamanhoSenha < 5) {
        alert("A senha é muito curta! Ela precisa ter pelo menos 5 dígitos.");
        return false;
    }

    fetch("/usuarios/cadastrar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        nomeServer: nomeVar,
        emailServer: emailVar,
        senhaServer: senhaVar,
      }),
    })
      .then(function (resposta) {
        console.log("resposta: ", resposta);

        if (resposta.ok) {
          alert("Cadastro realizado com sucesso! Redirecionando...");
          setTimeout(() => {
            window.location = "./Login.html";
          }, "2000");
        } else {
          throw "Houve um erro ao tentar realizar o cadastro!";
        }
      })
      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
      });

    return false;
  }
</script>

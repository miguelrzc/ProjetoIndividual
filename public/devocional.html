<div class="container">
    <div class="topo">
        <h1>Novo <span>Devocional</span></h1>
        <p id="data"></p>
    </div>

    <div class="form-card"> 
        <div class="reflexao"> — ESCREVA SUA REFLEXÃO</div>

        <div class="campo">
            <div class="campo-titulo">Versículo</div>
            <input type="text" id="input_versiculo" placeholder='Ex: "O Senhor é o meu pastor."'>
        </div>

        <div class="campo">
            <div class="campo-titulo">Reflexão</div>
            <textarea id="input_reflexao" placeholder="O que eu aprendi hoje?"></textarea>
        </div>

        <button class="btn-salvar" onclick="salvar()">Salvar meu <span>Devocional</span></button>

    </div> 
    
</div>

<script>
function salvar() {
    var versiculoVar = input_versiculo.value;
    var reflexaoVar = input_reflexao.value;
    
    var categoriaVar = 1; 
    
    var idUsuarioVar = sessionStorage.ID_USUARIO;

    if (versiculoVar == "" || reflexaoVar == "") {
        alert("Preencha todos os campos!");
        return false;
    }

    fetch("/devocional/registrar", { 
        method: "POST",
        headers: {
            "Content-Type": "application/json",
        },
        body: JSON.stringify({
            versiculoServer: versiculoVar,
            reflexaoServer: reflexaoVar,
            categoriaServer: categoriaVar, 
            usuarioServer: idUsuarioVar    
        }),
    })
    .then(function (resposta) {
        console.log("resposta: ", resposta);

        if (resposta.ok) {
            alert("Devocional Salvo com sucesso!");  
            window.location = "./devocional.html";
        } else {
            resposta.text().then(texto => {
                console.error("Erro técnico:", texto);
                alert("Erro ao salvar: " + texto);
            });
        }
    })
    .catch(function (erro) {
        console.log(`#ERRO: ${erro}`);
    });

    return false;
}

</script>
